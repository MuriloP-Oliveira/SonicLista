<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Catálogo Sonic</title>
    <link rel="stylesheet" th:href="@{css/index.css}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h2>Acesso ao Sistema</h2>
            <p>Gerenciamento do Catálogo</p>
        </div>

        <form id="form-login" th:action="@{/login}" method="POST">
        <div th:if="${param.error}" style="color: #ff4d4d; text-align: center; margin-bottom: 15px; font-weight: bold;">
            Usuário ou senha incorretos!
        </div>
        <div th:if="${param.logout}" style="color: #2ecc71; text-align: center; margin-bottom: 15px; font-weight: bold;">
            Você saiu do sistema com sucesso.
        </div>

        <form id="form-login" th:action="@{/login}" method="POST">
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="login-footer">
            <a th:href="@{/}">Voltar para o catálogo</a>
        </div>
    </div>

</body>
</html>
