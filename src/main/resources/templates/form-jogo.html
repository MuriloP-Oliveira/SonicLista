<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Jogo</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <script th:src="@{/js/main.js}"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h2>Salvar Jogo</h2>
            <p>Faça o upload da capa oficial</p>
        </div>

        <form id="form-crud" th:action="@{/cadastroJogo}" th:object="${jogo}" method="POST" enctype="multipart/form-data">           
            
            <input type="hidden" th:field="*{id}">
            
            <div class="input-group">
                <label for="nm_jogo">Nome do Jogo</label>
                <input type="text" id="nm_jogo" th:field="*{nmJogo}" required>
            </div>
            
            <div class="input-group">
                <label for="ano_lancamento">Ano de Lançamento</label>
                <input type="number" id="ano_lancamento" th:field="*{anoLancamento}" required>
            </div>

            <div class="input-group">
                <label for="file">Capa do Jogo (Imagem)</label>
                <input type="file" id="file" name="file" accept="image/*">
            </div>

            <button type="submit" class="btn-login">Salvar Jogo</button>
        </form>
        
        <div class="login-footer">
            <a th:href="@{/admin}">Cancelar e voltar</a>
        </div>
    </div>
</body>
</html>
