<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Sonic</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <script th:src="@{/js/main.js}"></script>
</head>
<body class="bg-admin">
    <header class="header-admin">
        <div class="header-admin-top">
             <a th:href="@{/logout}" class="btn-voltar-home">← Sair e Encerrar Sessão</a>
             <h1>Gerenciar Catálogo</h1>
             <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                 <a th:href="@{/videogame/listar}" class="btn-novo" style="background-color: #00aaff; border-color: #00aaff; color: white;">Ver Consoles</a>
                 <a th:href="@{/videogame/cadastrar}" class="btn-novo" style="background-color: #27ae60; border-color: #27ae60; color: white;">+ Novo Console</a>
                 <a th:href="@{/videogame/atribuir}" class="btn-novo" style="background-color: #f39c12; border-color: #f39c12; color: white;">Vincular Plataforma</a>
                 <a th:href="@{/cadastroJogo}" class="btn-novo">+ Novo Jogo</a>
             </div>
        </div>
    </header>
    
    <main class="container-admin">
        <table class="tabela-crud">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Capa</th>
                    <th>Nome do Jogo</th>
                    <th>Ano</th>
                    <th>Plataformas</th> <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="jogo : ${jogos}">
                    
                    <td th:text="${jogo.id}">ID</td>
                    
                    <td>
                        <img th:src="${jogo.urlImagem}" alt="Capa" style="width: 60px; border-radius: 5px;">
                    </td>

                    <td th:text="${jogo.nmJogo}">Nome do Jogo</td>
                    <td th:text="${jogo.anoLancamento}">Ano</td>
                    
                    <td>
                        <span th:if="${#lists.isEmpty(jogo.videoGames)}" style="color: #888; font-style: italic;">Nenhuma</span>
                        <span th:unless="${#lists.isEmpty(jogo.videoGames)}" th:each="vg, iter : ${jogo.videoGames}">
                            <span th:text="${vg.nome}"></span><span th:if="${!iter.last}">, </span>
                        </span>
                    </td>
                    
                    <td>
                        <a th:href="@{/editar/{id}(id=${jogo.id})}" class="btn-editar" style="text-decoration: none; display: inline-block; text-align: center;">Editar</a>
                        <form th:action="@{/excluir/{id}(id=${jogo.id})}" method="post" class="form-excluir" style="display: inline-block;">
                            <input class="btn-excluir" style="text-decoration: none; text-align: center; cursor: pointer;" type="submit" value="Deletar">
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
